# OpenRouter credentials profile.
#
# Routes both claude (via the Anthropic-compatible endpoint) and codex
# (via the openai-compatible endpoint) through OpenRouter. The Hydra
# selector maps OPENROUTER_API_KEY → both CLIs; the per-sandbox
# config_files entries scope settings.json / config.toml under the run's
# .claude/ and .codex/ dirs (CLAUDE_CONFIG_DIR / CODEX_HOME) so the
# user's global config is never touched.
#
# Required: OPENROUTER_API_KEY must be set in the shell or .env.
# Earlier revisions of this profile silently fell back to LLM_API_KEY
# when OPENROUTER_API_KEY was missing, which then sent the LiteLLM
# proxy key to openrouter.ai/api/v1 — silent 401. We now require the
# key explicitly; an empty resolution yields an empty env var, which
# makes the codex / claude CLIs fail loudly with a clear "missing
# credential" error instead of an authentication mystery.
#
# default_model is the OpenRouter slug we pin every claude_* alias to —
# the bundled CLI checks the model name client-side and silently no-ops on
# anything that doesn't look like an Anthropic SKU, so we substitute the
# right OpenRouter model under each ANTHROPIC_DEFAULT_*_MODEL knob.
profile: openrouter
default_model: z-ai/glm-5.1

claude:
  env:
    # CLAUDE_CONFIG_DIR will point at the sandbox-scoped dir at run time
    # (set by claude.py's _run_inner once the shim materializes the dir);
    # ANTHROPIC_AUTH_TOKEN here mirrors what settings.json declares so the
    # SDK's in-process env read also resolves cleanly even before the CLI
    # re-reads the dir.
    ANTHROPIC_AUTH_TOKEN: ${oc.env:OPENROUTER_API_KEY,""}
    ANTHROPIC_BASE_URL: ${oc.env:OPENROUTER_API_BASE,https://openrouter.ai/api/v1}
  config_files:
    - target: settings.json
      content_type: json
      content:
        env:
          ANTHROPIC_BASE_URL: ${oc.env:OPENROUTER_API_BASE,https://openrouter.ai/api/v1}
          ANTHROPIC_AUTH_TOKEN: ${oc.env:OPENROUTER_API_KEY,""}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${credentials.default_model}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${credentials.default_model}
          ANTHROPIC_DEFAULT_HAIKU_MODEL: ${credentials.default_model}
          CLAUDE_CODE_DISABLE_EXPERIMENTAL_BETAS: ""
          ENABLE_TOOL_SEARCH: ""

codex:
  env:
    # codex's openrouter provider block reads OPENROUTER_API_KEY via
    # env_key — the codex CLI looks up the key at request time, so it
    # only needs to be present in the subprocess env.
    OPENROUTER_API_KEY: ${oc.env:OPENROUTER_API_KEY,""}
  config_files:
    - target: config.toml
      content_type: toml_raw
      content: |
        model_provider = "openrouter"
        model_reasoning_effort = "high"
        model = "${credentials.default_model}"

        [model_providers.openrouter]
        name = "openrouter"
        base_url = "https://openrouter.ai/api/v1"
        env_key = "OPENROUTER_API_KEY"
