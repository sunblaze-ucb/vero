# OpenAI-direct credentials profile.
#
# Use when codex should talk to api.openai.com directly (no LiteLLM
# router, no OpenRouter). The claude block is empty; pair this with
# `agent=codex` for OpenAI-direct codex runs.
profile: openai
default_model: null

claude:
  env: {}
  config_files: []

codex:
  env:
    OPENAI_API_KEY: ${oc.env:OPENAI_API_KEY,}
  config_files: []
