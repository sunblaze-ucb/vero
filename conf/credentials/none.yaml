# Pass-through credentials profile — no env injection, no scoped config.
#
# `credentials=none` deliberately leaves env: empty and config_files: [],
# which makes the shim skip CLAUDE_CONFIG_DIR / CODEX_HOME export and the
# bundled CLIs pick up the user's global config dir (~/.claude/,
# ~/.codex/) verbatim. Use when the user has hand-curated their own
# claude / codex setup and just wants the harness to drive prompt + log.
profile: none
default_model: null

claude:
  env: {}
  config_files: []

codex:
  env: {}
  config_files: []
