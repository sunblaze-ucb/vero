# Anthropic-direct credentials profile.
#
# Use when you want the claude SDK / CLI to talk to api.anthropic.com
# without any router in between. codex doesn't talk to Anthropic, so its
# block is empty and CodexAgent will fall back to its legacy
# _prepare_codex_home (which won't be useful for an Anthropic-only run —
# the typical pairing is `agent=claude credentials=anthropic`).
profile: anthropic
default_model: null

claude:
  env:
    ANTHROPIC_API_KEY: ${oc.env:ANTHROPIC_API_KEY,}
  config_files: []

codex:
  env: {}
  config_files: []
