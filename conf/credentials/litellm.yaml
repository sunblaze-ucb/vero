# LiteLLM-router credentials profile (default).
#
# Mirrors the env block that used to live in conf/agent/{claude,codex}.yaml.
# Resolves API keys / base URLs from the project .env's litellm-style
# variables (LLM_API_KEY, LLM_API_BASE) so a single .env feeds both agents.
# Keeps config_files empty so the agents fall back to their legacy code
# paths: claude reads ~/.claude/settings.json (today's behavior); codex.py
# scaffolds .codex_home/ under the sandbox via _prepare_codex_home.
profile: litellm
default_model: null

claude:
  env:
    ANTHROPIC_API_KEY: ${oc.env:CLAUDE_AGENT_API_KEY,${oc.env:LLM_API_KEY,}}
    ANTHROPIC_BASE_URL: ${oc.env:CLAUDE_AGENT_API_BASE,${oc.env:LLM_API_BASE,}}
  config_files: []

codex:
  env:
    CODEX_API_KEY: ${oc.env:CODEX_AGENT_API_KEY,${oc.env:LLM_API_KEY,}}
    OPENAI_API_KEY: ${oc.env:CODEX_AGENT_API_KEY,${oc.env:LLM_API_KEY,}}
  config_files: []
